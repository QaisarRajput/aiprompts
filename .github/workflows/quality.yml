name: Quality Checks

on:
  pull_request:
    paths:
      - apps/web/**
      - packages/**
      - data/**
      - .lighthouserc.json
  push:
    branches:
      - main
    paths:
      - apps/web/**
      - packages/**
      - data/**
      - .lighthouserc.json

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build Static Site
        run: corepack pnpm web:build

      - name: Run Lighthouse CI
        run: |
          npx @lhci/cli@0.15.1 autorun \
            --collect.staticDistDir=apps/web/out \
            --collect.url=http://127.0.0.1:4173/ \
            --collect.url=http://127.0.0.1:4173/browse/ \
            --collect.url=http://127.0.0.1:4173/browse/gpt-image-2/ \
            --collect.numberOfRuns=3
